      - name: "slug"
        type: "TEXT"
        nullable: false
        description: "URL-safe unique identifier"
        semantic_role: "identifier"
        format: "kebab-case"
        source_of_truth: true
        volatility: "immutable"
        consumer: "egress views, API"
      - name: "name"
        type: "TEXT"
        nullable: false
        description: "Human-readable skill name"
        semantic_role: "label"
        format: "free text"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views"
      - name: "description"
        type: "TEXT"
        nullable: false
        description: "Skill purpose and scope description"
        semantic_role: "description"
        format: "free text"
        source_of_truth: true
        volatility: "mutable"
