# ═══════════════════════════════════════════════════════════════════════════════
# FLEET SECRETS MANIFEST — Doppler Sovereign Vault Inventory
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Sovereign CC-01)
# Purpose: Map every secret in the fleet. Sovereign vault is single source of truth.
# Location: imo-creator repo root (NOT in templates/ — this is operational)
# Usage: Read by scripts/fleet-secrets-sync.sh to push secrets from vault to children
# ═══════════════════════════════════════════════════════════════════════════════
#
# CATEGORIES:
#   SOVEREIGN  — Never pushed to children. Sovereign-only secrets.
#   GLOBAL     — Shared keys stored once in vault, pushed to children that need them.
#   CHILD      — One child's secrets, stored prefixed in vault, pushed unprefixed.
#
# NAMING CONVENTION:
#   Sovereign:  no prefix        (DATABASE_URL)
#   Global:     GLOBAL_ prefix   (GLOBAL_ANTHROPIC_API_KEY)
#   Child:      CHILD_ prefix    (OUTREACH_DATABASE_URL, CL_HUB_ID)
#
# SYNC DIRECTION:
#   imo-creator vault → child Doppler project (push-down only, never reverse)
#
# ═══════════════════════════════════════════════════════════════════════════════

vault:
  doppler_project: "imo-creator"
  base_config: "dev"

# ─────────────────────────────────────────────────────────────────────────────
# SOVEREIGN — Never pushed to children
# ─────────────────────────────────────────────────────────────────────────────
sovereign:
  description: "Secrets owned exclusively by imo-creator. Never synced downstream."
  secrets:
    - vault_name: "DATABASE_URL"
      description: "Sovereign Neon database (Garage command DB)"
      rotation_days: 90

    - vault_name: "GARAGE_SIGNING_KEY"
      description: "Garage artifact signing key"
      rotation_days: 90
      status: "ACTIVE"
      notes: "Generated 2026-03-03 — HMAC-SHA256 256-bit key"

    - vault_name: "SUPADATA_API_KEY"
      description: "Supadata API key (YouTube/social media transcript data)"
      rotation_days: 90

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL — Shared keys, pushed to children that need them
# ─────────────────────────────────────────────────────────────────────────────
global:
  description: "Keys shared across multiple children. Stored once with GLOBAL_ prefix."
  secrets:
    # --- AI / LLM ---
    - vault_name: "GLOBAL_ANTHROPIC_API_KEY"
      child_name: "ANTHROPIC_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 90

    - vault_name: "GLOBAL_OPENAI_API_KEY"
      child_name: "OPENAI_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 90

    - vault_name: "GLOBAL_GEMINI_API_KEY"
      child_name: "GEMINI_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 90

    # --- DevOps ---
    - vault_name: "GLOBAL_GITHUB_TOKEN"
      child_name: "GITHUB_TOKEN"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 30

    # --- Composio (shared across outreach + sales) ---
    - vault_name: "GLOBAL_COMPOSIO_API_KEY"
      child_name: "COMPOSIO_API_KEY"
      push_to: ["barton-outreach-core", "sales-navigator"]
      source: "barton-outreach-core"
      rotation_days: 90

    - vault_name: "GLOBAL_COMPOSIO_API_URL"
      child_name: "COMPOSIO_API_URL"
      push_to: ["barton-outreach-core", "sales-navigator"]
      source: "barton-outreach-core"
      rotation_days: 90

    - vault_name: "GLOBAL_COMPOSIO_MCP_URL"
      child_name: "COMPOSIO_MCP_URL"
      push_to: ["barton-outreach-core", "sales-navigator"]
      source: "barton-outreach-core"
      rotation_days: 90

    # --- Google ---
    - vault_name: "GLOBAL_GOOGLE_API_KEY"
      child_name: "GOOGLE_API_KEY"
      push_to: ["barton-outreach-core", "barton-storage"]
      source: "barton-outreach-core"
      rotation_days: 90

    # --- Mailgun (Email Sending) ---
    - vault_name: "GLOBAL_MAILGUN_API_KEY"
      child_name: "MAILGUN_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "mailgun-account"
      rotation_days: 90

    - vault_name: "GLOBAL_MAILGUN_DOMAIN"
      child_name: "MAILGUN_DOMAIN"
      push_to: ["barton-outreach-core"]
      source: "mailgun-account"
      rotation_days: 90

    # --- Cloudflare ---
    - vault_name: "GLOBAL_CLOUDFLARE_ACCOUNT_ID"
      child_name: "CLOUDFLARE_ACCOUNT_ID"
      push_to: ["barton-outreach-core"]
      source: "cloudflare-account"
      rotation_days: 365

    - vault_name: "GLOBAL_CLOUDFLARE_API_TOKEN"
      child_name: "CLOUDFLARE_API_TOKEN"
      push_to: ["barton-outreach-core", "barton-storage"]
      source: "cloudflare-dashboard"
      rotation_days: 90
      status: "ACTIVE"
      notes: "Provisioned 2026-03-11 — scoped to Workers, D1, KV, Queues"

    # --- HeyReach (LinkedIn Outreach) ---
    - vault_name: "GLOBAL_HEYREACH_API_KEY"
      child_name: "HEYREACH_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "heyreach-account"
      rotation_days: 90

    # --- Data Tools ---
    - vault_name: "GLOBAL_FIRECRAWL_API_KEY"
      child_name: "FIRECRAWL_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 90

    - vault_name: "GLOBAL_APIFY_API_KEY"
      child_name: "APIFY_API_KEY"
      push_to: ["barton-outreach-core"]
      source: "barton-outreach-core"
      rotation_days: 90

