# SNAP-ON TOOLBOX - MASTER REGISTRY
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Constitutional)
# Governing Engine: Tier 0 Doctrine (law/doctrine/TIER0_DOCTRINE.md)
# Status: LOCKED - Claude Code MUST read before suggesting any tool
# Location: imo-creator/law/SNAP_ON_TOOLBOX.yaml
# NOTE: "Tier 0/1/2" in this file = PRICING TIERS (free/cheap/surgical), NOT Tier 0 Doctrine
# ═══════════════════════════════════════════════════════════════════════════════

version: "2.0.0"
last_updated: "2026-01-28"
doctrine: "Snap-on - One tool, many jobs, config is the variable"

# ═══════════════════════════════════════════════════════════════════════════════
# EVALUATION CRITERIA
# ═══════════════════════════════════════════════════════════════════════════════
criteria:
  tier_0_free:
    definition: "Claude Code, existing infra, stdlib, free APIs"
    cost: "$0"
    priority: "Build first"

  tier_1_cheap:
    definition: "< $0.01/call or fixed subscription already owned"
    cost: "Minimal"
    priority: "Use freely within limits"

  tier_2_surgical:
    definition: "Per-call cost, gated by business rules"
    cost: "Pay-per-use"
    priority: "Fire only when criteria met"

# ═══════════════════════════════════════════════════════════════════════════════
# EVALUATION ORDER (MANDATORY)
# ═══════════════════════════════════════════════════════════════════════════════
evaluation_order:
  - step: 1
    action: "CHECK BANNED LIST FIRST"
    on_match: "STOP — suggest approved alternative"

  - step: 2
    action: "CHECK TIER 0 (FREE)"
    question: "Can this be done with existing free tools?"

  - step: 3
    action: "CHECK TIER 1 (CHEAP)"
    question: "Is there an existing subscription that covers this?"

  - step: 4
    action: "CHECK TIER 2 (SURGICAL)"
    question: "Does this meet gate conditions for paid per-call tools?"

  - step: 5
    action: "IF NOT LISTED"
    on_match: "ASK — may need ADR for new tool"

# ═══════════════════════════════════════════════════════════════════════════════
# TIER 0: GENERIC FREE TOOLS
# ═══════════════════════════════════════════════════════════════════════════════
# These tools are DOMAIN-AGNOSTIC and may be used by any child repo.
# Child repos define their own consumers in their REPO_DOMAIN_SPEC.md.
# ═══════════════════════════════════════════════════════════════════════════════

tools:

  MXLookup:
    tool_id: "TOOL-001"
    tier: 0
    status: "active"
    software:
      primary: "dnspython"
      dependencies: ["dnspython>=2.4"]
      vendor: null
      requires_api_key: false
    purpose:
      summary: "Validates domain has functioning mail server"
      what_it_does:
        - "DNS MX record lookup"
        - "Mail server existence validation"
    throttle:
      rate_limits:
        - {scope: "per_second", limit: 50}
        - {scope: "per_day", limit: 50000}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "linear", initial_delay_ms: 100, max_retries: 2}
    guardrails:
      kill_switch: {trigger: "dns_resolver_failure", action: "switch_resolver"}
      data_quality: {cache_ttl_hours: 24}
    accuracy: "100%"
    accuracy_notes: "Binary - MX exists or not"

  SMTPCheck:
    tool_id: "TOOL-002"
    tier: 0
    status: "active"
    software:
      primary: "smtplib (stdlib)"
      dependencies: []
      vendor: null
      requires_api_key: false
    purpose:
      summary: "Validates email deliverability via SMTP handshake"
      what_it_does:
        - "SMTP connection test"
        - "RCPT TO validation (where allowed)"
        - "Catch-all detection"
    throttle:
      rate_limits:
        - {scope: "per_domain", limit: 1, window: "2s"}
        - {scope: "per_day", limit: 10000}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "exponential", initial_delay_ms: 2000, max_retries: 2}
    guardrails:
      kill_switch: {trigger: "ip_blacklist_detected", action: "halt_and_alert"}
      data_quality: {cache_ttl_hours: 168}
    accuracy: "95%"
    accuracy_notes: "Some servers reject all RCPT TO probes"

  LinkedInCheck:
    tool_id: "TOOL-003"
    tier: 0
    status: "active"
    software:
      primary: "httpx"
      dependencies: ["httpx>=0.25"]
      vendor: null
      requires_api_key: false
    purpose:
      summary: "Validates LinkedIn company/profile URL exists"
      what_it_does:
        - "HTTP HEAD request to LinkedIn URL"
        - "200 vs 404 validation"
      what_it_does_NOT_do:
        - "Scrape LinkedIn content (ToS violation)"
    throttle:
      rate_limits:
        - {scope: "per_minute", limit: 30}
        - {scope: "per_day", limit: 1000}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "exponential", initial_delay_ms: 2000, max_retries: 2}
    guardrails:
      kill_switch: {trigger: "403_or_429_sustained", action: "circuit_break_1h"}
      data_quality: {cache_ttl_hours: 168}
    accuracy: "90%"
    accuracy_notes: "URL exists != person still there"

  CLIAnything:
    tool_id: "TOOL-013"
    tier: 0
    status: "active"
    adr_ref: "ADR-029"
    software:
      primary: "CLI-Anything"
      dependencies: []
      vendor: null
      requires_api_key: false
      source: "https://github.com/HKUDS/CLI-Anything"
    purpose:
      summary: "Generate CLI wrappers for any software — makes GUI apps agent-controllable"
      what_it_does:
        - "Analyze codebase and generate structured CLI harness"
        - "PEP 420 namespace package output with JSON mode"
        - "REPL mode, undo/redo, test suite generation"
      what_it_does_NOT_do:
        - "Replace existing APIs, MCP servers, or Composio toolkits"
        - "Runtime LLM decisions — output is deterministic CLI"
    usage_doctrine: |
      CLI-Anything is LAST RESORT. Before using, check in order:
      1. Composio toolkit exists? → Use Composio
      2. MCP server exists? → Use MCP
      3. REST API exists? → Use direct API
      4. None of the above? → CLI-Anything
    throttle:
      rate_limits:
        - {scope: "per_run", limit: 1, notes: "Local tool, one generation at a time"}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "none", max_retries: 0}
    guardrails:
      kill_switch: {trigger: "generation_failure", action: "abort_no_retry"}
      timeout: {max_seconds: 300}
    accuracy: "N/A"
    accuracy_notes: "Code generation tool — quality depends on target codebase"

  UIUXProMax:
    tool_id: "TOOL-014"
    tier: 0
    status: "active"
    adr_ref: "ADR-030"
    software:
      primary: "UI/UX Pro Max"
      dependencies: []
      vendor: null
      requires_api_key: false
      source: "https://github.com/nextlevelbuilder/ui-ux-pro-max-skill"
    purpose:
      summary: "Design intelligence database — proven palettes, pairings, and UX patterns for non-designers"
      what_it_does:
        - "67+ UI styles, 161 color palettes, 57 font pairings, 99 UX guidelines"
        - "25 chart type recommendations across 9 tech stacks"
        - "161 industry-specific reasoning rules (SaaS, fintech, healthcare, etc.)"
        - "Deterministic design lookup — query database instead of guessing"
      what_it_does_NOT_do:
        - "Replace human designers for brand-critical work"
        - "Generate designs from scratch — it provides reference data"
        - "Runtime LLM decisions — output is deterministic lookup"
    usage_doctrine: |
      Activates alongside any frontend build task. Provides the design
      system brain — color, typography, UX patterns. Claude queries
      proven palettes and pairings instead of guessing.
      Determinism in design: lookup, not generation.
    throttle:
      rate_limits:
        - {scope: "per_session", limit: null, notes: "Local skill, no external calls"}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "none", max_retries: 0}
    guardrails:
      kill_switch: {trigger: "N/A", action: "passive_reference_database"}
      timeout: {max_seconds: null}
    accuracy: "N/A"
    accuracy_notes: "Reference database — quality depends on design brief alignment"

  DevBrowser:
    tool_id: "TOOL-015"
    tier: 0
    status: "active"
    adr_ref: "ADR-031"
    software:
      primary: "Playwright MCP"
      alternatives: ["Anthropic dev-browser plugin"]
      dependencies: ["@playwright/mcp"]
      vendor: "Microsoft (Playwright) / Anthropic (dev-browser)"
      requires_api_key: false
      source: "https://github.com/microsoft/playwright-mcp"
      install: "claude mcp add playwright -- npx @playwright/mcp@latest"
    purpose:
      summary: "Visual QA loop — screenshot, evaluate, and fix UI without human eyes"
      what_it_does:
        - "Open browser, navigate to built UI, take screenshots"
        - "Accessibility tree snapshots for token-efficient verification"
        - "Cross-browser testing (Chrome, Firefox, Safari)"
        - "Close the build-verify-fix circle autonomously"
      what_it_does_NOT_do:
        - "Replace end-to-end test suites"
        - "Production monitoring or uptime checks"
        - "Runtime LLM decisions — browser is source of truth"
    usage_doctrine: |
      Circle validation — output feeds back to input. After any frontend
      build, dev-browser screenshots and verifies the result. If something
      looks wrong, fix and re-verify. Iterate until clean.
      Preference order: 1) Anthropic dev-browser  2) Playwright MCP
    throttle:
      rate_limits:
        - {scope: "per_verification", limit: 10, notes: "Max 10 screenshot-fix cycles per page"}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "none", max_retries: 0}
    guardrails:
      kill_switch: {trigger: "browser_crash_or_timeout", action: "abort_page_continue_pipeline"}
      timeout: {max_seconds: 30}
    accuracy: "N/A"
    accuracy_notes: "Visual verification tool — pixel-accurate rendering via real browser"

  - tool_id: "TOOL-016"
    tier: 0
    status: "active"
    adr_ref: "ADR-032"
    software:
      primary: "shadcn/ui MCP"
      alternatives: ["@jpisnice/shadcn-ui-mcp-server"]
      dependencies: ["shadcn"]
      vendor: "shadcn (official)"
      requires_api_key: false
      source: "https://ui.shadcn.com/docs/mcp"
      install: "claude mcp add shadcn-ui -- npx shadcn@latest mcp"
    purpose:
      summary: "Direct component lookup — query available shadcn/ui components, props, variants instead of guessing"
      what_it_does:
        - "Browse available components from any shadcn-compatible registry"
        - "Search for specific components by name or category"
        - "Install components directly into the project via natural language"
        - "Return exact API surface — props, variants, slots — for deterministic usage"
      what_it_does_NOT_do:
        - "Design decisions — component selection is human/doctrine-driven"
        - "Runtime rendering or preview"
        - "Replace reading component source code for complex customization"
    usage_doctrine: |
      Determinism over hallucination. When building React UI with shadcn/ui,
      Claude looks up the exact component API from the registry instead of
      guessing props or variants from training data. Registry is source of truth.
    throttle:
      rate_limits:
        - {scope: "per_component_lookup", limit: 50, notes: "Generous — lookups are free and fast"}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "none", max_retries: 0}
    guardrails:
      kill_switch: {trigger: "registry_unreachable", action: "fallback_to_local_node_modules"}
      timeout: {max_seconds: 15}
    accuracy: "N/A"
    accuracy_notes: "Registry lookup — returns exact published component API"

  - tool_id: "TOOL-017"
    tier: 0
    status: "active"
    adr_ref: "ADR-033"
    software:
      primary: "a11y-mcp"
      alternatives: ["a11y-mcp-server", "mcp-accessibility-scanner"]
      dependencies: ["a11y-mcp", "axe-core", "puppeteer"]
      vendor: "Community (priyankark)"
      requires_api_key: false
      source: "https://github.com/priyankark/a11y-mcp"
      install: "claude mcp add a11y -- npx a11y-mcp"
    purpose:
      summary: "Accessibility auditing with axe-core — catches WCAG violations before they ship"
      what_it_does:
        - "Run axe-core accessibility audits on any webpage URL"
        - "Filter by WCAG tag (wcag2a, wcag2aa, wcag21aa, best-practice)"
        - "Return detailed violation reports with element selectors and fix suggestions"
        - "Summary mode for quick pass/fail gate checks"
      what_it_does_NOT_do:
        - "Fix accessibility issues automatically — reports only"
        - "Test keyboard navigation flows or screen reader compatibility"
        - "Replace manual accessibility testing by disabled users"
    usage_doctrine: |
      Gate check, not afterthought. Run a11y audit after any UI build before
      declaring the page complete. WCAG 2.1 AA is the minimum bar.
      Violations are bugs, not suggestions.
    throttle:
      rate_limits:
        - {scope: "per_page_audit", limit: 20, notes: "Max 20 audits per session"}
      cost: {model: "free", estimated_cost_per_call: 0.00}
      backoff: {strategy: "none", max_retries: 0}
    guardrails:
      kill_switch: {trigger: "puppeteer_crash_or_timeout", action: "log_and_skip"}
      timeout: {max_seconds: 30}
    accuracy: "N/A"
    accuracy_notes: "axe-core engine — industry-standard WCAG rule set, deterministic"

  - tool_id: "TOOL-018"
    tier: 0
    status: "active"
    adr_ref: "ADR-034"
    software:
      primary: "Supadata"
      alternatives: ["@supadata/js (SDK)", "direct REST API"]
      dependencies: ["@supadata/mcp"]
      vendor: "Supadata (rafalzawadzki)"
      requires_api_key: true
      source: "https://supadata.ai/"
      install: "claude mcp add supadata -e SUPADATA_API_KEY=<key> -- npx -y @supadata/mcp"
    purpose:
      summary: "Video transcript extraction + web scraping — data ingestion spoke"
      what_it_does:
        - "Extract transcripts from YouTube, TikTok, Instagram, Facebook, Twitter videos"
        - "Scrape web pages and return clean structured Markdown"
        - "AI-powered structured data extraction from video content"
        - "Batch processing for multiple URLs"
      what_it_does_NOT_do:
        - "Analyze, process, or make decisions on ingested content — spoke only"
        - "Store data — returns results for hub to persist"
        - "Generate content — extraction and transformation only"
    usage_doctrine: |
      Data ingestion SPOKE. Feeds raw content INTO the system for hub processing.
      Does not process, analyze, or decide. Hub-spoke discipline applies.
      Free tier: 100 requests — use judiciously for testing.
    throttle:
      rate_limits:
        - {scope: "per_session", limit: 20, notes: "Max 20 transcript/scrape calls per session"}
        - {scope: "free_tier_total", limit: 100, notes: "Free tier cap — monitor usage"}
      cost: {model: "freemium", estimated_cost_per_call: 0.00}
      backoff: {strategy: "exponential", max_retries: 2}
    guardrails:
      kill_switch: {trigger: "rate_limit_exceeded", action: "stop_and_warn"}
      timeout: {max_seconds: 30}
    accuracy: "N/A"
    accuracy_notes: "Deterministic transcript extraction — returns raw video captions and page content"

