      - name: "agent_type"
        type: "TEXT"
        nullable: false
        description: "Which agent type this skill is designed for"
        semantic_role: "classification"
        format: "enum: orchestrator, planner, worker, db_agent, auditor, refit_coordinator, general_purpose"
        source_of_truth: true
        volatility: "immutable"
        consumer: "search, filter"
      - name: "cc_layer"
        type: "TEXT"
        nullable: false
        description: "Canonical Chain layer"
        semantic_role: "classification"
        format: "enum: CC-01, CC-02, CC-03, CC-04"
        source_of_truth: true
        volatility: "immutable"
        consumer: "search, filter"
      - name: "input_contract_fields"
        type: "TEXT[]"
        nullable: false
        description: "Declared input fields this skill expects"
        semantic_role: "contract"
        format: "text array"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views, validation"
      - name: "output_contract_fields"
        type: "TEXT[]"
        nullable: false
        description: "Declared output fields this skill produces"
        semantic_role: "contract"
        format: "text array"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views, validation"
      - name: "input_description"
        type: "TEXT"
        nullable: false
        description: "Human-readable description of expected input"
        semantic_role: "description"
        format: "free text"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views"
      - name: "output_description"
        type: "TEXT"
        nullable: false
        description: "Human-readable description of produced output"
        semantic_role: "description"
        format: "free text"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views"
      - name: "depends_on_skills"
        type: "UUID[]"
        nullable: false
        description: "Array of skill_ids this skill depends on"
        semantic_role: "dependency"
        format: "UUID array"
        source_of_truth: true
        volatility: "mutable"
        consumer: "dependency resolution"
      - name: "source_file"
        type: "TEXT"
        nullable: true
        description: "Source file path for the skill definition"
        semantic_role: "provenance"
        format: "file path"
        source_of_truth: false
        volatility: "immutable"
        consumer: "traceability"
      - name: "source_hash"
        type: "TEXT"
        nullable: false
        description: "SHA-256 hash of the source file"
        semantic_role: "integrity"
        format: "SHA-256 hex string"
        source_of_truth: true
        volatility: "mutable"
        consumer: "psb.skill_versions, audit"
      - name: "doctrine_compliance"
        type: "TEXT"
        nullable: false
        description: "Audit compliance status"
        semantic_role: "compliance"
        format: "enum: COMPLIANT, NON_COMPLIANT, PENDING_AUDIT"
        source_of_truth: true
        volatility: "mutable"
        consumer: "egress views, audit"
      - name: "status"
        type: "TEXT"
        nullable: false
        description: "Lifecycle status: DRAFT, ACTIVE, DEPRECATED"
        semantic_role: "lifecycle"
        format: "enum: DRAFT, ACTIVE, DEPRECATED"
        source_of_truth: true
        volatility: "mutable (forward-only)"
        consumer: "egress views, filter"

