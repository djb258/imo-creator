# ═══════════════════════════════════════════════════════════════════════════════
# AGENT PIPELINE TRIGGER
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: BAR-134
# Purpose: FALLBACK trigger when Claude.ai is not in the loop
# Primary path: Claude.ai → Composio → Claude Code (no CI needed)
# Fallback path: Push to GitHub → this workflow detects → invokes agent
# Requires: ANTHROPIC_API_KEY in GitHub repo secrets (fallback only)
# ═══════════════════════════════════════════════════════════════════════════════

name: Agent Pipeline

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'sys/runtime/inbox/**/*.json'

  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to invoke'
        required: true
        type: choice
        options:
          - orchestrator
          - planner
          - builder
          - db-agent
          - auditor
      packet_file:
        description: 'Packet file path (optional — uses oldest if blank)'
        required: false
        type: string

jobs:
  run-agent:
    name: Run Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect agent and packet
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AGENT="${{ inputs.agent }}"
            PACKET="${{ inputs.packet_file }}"
          else
            # Find which inbox got a new .json
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'sys/runtime/inbox/' 2>/dev/null || echo "")
            AGENT=""
            PACKET=""
            for file in $CHANGED; do
              case "$file" in
                sys/runtime/inbox/orchestrator/*.json) AGENT="orchestrator"; PACKET="$file"; break ;;
                sys/runtime/inbox/planner/*.json)      AGENT="planner";      PACKET="$file"; break ;;
                sys/runtime/inbox/builder/*.json)      AGENT="builder";      PACKET="$file"; break ;;
                sys/runtime/inbox/db-agent/*.json)     AGENT="db-agent";     PACKET="$file"; break ;;
                sys/runtime/inbox/auditor/*.json)      AGENT="auditor";      PACKET="$file"; break ;;
              esac
            done
          fi

          # If no specific packet, grab oldest in inbox
          if [ -z "$PACKET" ] && [ -n "$AGENT" ]; then
            PACKET=$(ls -tr "sys/runtime/inbox/$AGENT"/*.json 2>/dev/null | head -1)
          fi

          # Map agent to skill
          case "$AGENT" in
            orchestrator) SKILL="skills/agent-orchestrator/SKILL.md" ;;
            planner)      SKILL="skills/agent-planner/SKILL.md" ;;
            builder)      SKILL="skills/agent-builder/SKILL.md" ;;
            db-agent)     SKILL="skills/agent-db/SKILL.md" ;;
            auditor)      SKILL="skills/agent-auditor/SKILL.md" ;;
            *)            echo "No agent detected"; exit 0 ;;
          esac

          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"
          echo "packet=$PACKET" >> "$GITHUB_OUTPUT"
          echo "skill=$SKILL" >> "$GITHUB_OUTPUT"
          echo "Agent: $AGENT | Packet: $PACKET"

      - name: Invoke agent
        if: steps.detect.outputs.agent != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the ${{ steps.detect.outputs.agent }} agent.

            READ your skill: ${{ steps.detect.outputs.skill }}
            READ the contract: sys/runtime/PACKET_CONTRACT.md
            READ your packet: ${{ steps.detect.outputs.packet }}

            Do the work. When done:
            1. Write output to sys/runtime/outbox/${{ steps.detect.outputs.agent }}/
            2. Drop the next packet in the next agent's inbox:
               orchestrator → inbox/planner/
               planner → inbox/builder/
               builder → inbox/db-agent/
               db-agent → inbox/auditor/
               auditor → STOP (write report to outbox/auditor/ only)
            3. Commit: "pipeline(${{ steps.detect.outputs.agent }}): [BAR-ID] — [description]"
            4. Push.

            Packets are immutable. If blocked, write status=failed and STOP.
          allowed_tools: |
            Read
            Write
            Edit
            Glob
            Grep
            Bash(git status)
            Bash(git add)
            Bash(git commit)
            Bash(git push)
            Bash(ls)
            Bash(mkdir)
          timeout_minutes: 30
