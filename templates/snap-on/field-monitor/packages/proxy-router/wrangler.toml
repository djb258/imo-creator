name = "field-monitor-proxy-router"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
ENVIRONMENT = "development"

# Neon read-only connection for rate_state lookups
# DATABASE_URL is bound as a secret via `wrangler secret put DATABASE_URL`

# KV namespace for egress path lookup
# Bind via: wrangler kv:namespace create EGRESS_KV
[[kv_namespaces]]
binding = "EGRESS_KV"
id = "66e6c7bec8c1479ba708c0bcbb6a0e23"
