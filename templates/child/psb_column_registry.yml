# ═══════════════════════════════════════════════════════════════════════════════
# EGRESS VIEWS (Migration 015)
# ═══════════════════════════════════════════════════════════════════════════════
#
# psb.prompts_active      — Active prompts only
# psb.reverse_lookup      — Reverse index joined with prompt details
# psb.skills_active       — Active skills with binding counts
# psb.skill_dependency_tree — Skill dependencies (one level)
# psb.prompt_skill_map    — Full prompt ↔ skill cross-reference
#
# ═══════════════════════════════════════════════════════════════════════════════
