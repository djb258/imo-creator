# ═══════════════════════════════════════════════════════════════════════════════
# DOCTRINE ENFORCEMENT CI
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Constitutional)
# Purpose: Mirror pre-commit doctrine checks in CI
# Behavior: FAIL on violations, WARN on warnings
# ═══════════════════════════════════════════════════════════════════════════════

name: Doctrine Enforcement

on:
  push:
    branches:
      - master
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - master
      - main

jobs:
  doctrine-audit:
    name: Doctrine Compliance Audit
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────
      # SETUP
      # ─────────────────────────────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make audit script executable
        run: |
          if [ -f "templates/scripts/apply_doctrine_audit.sh" ]; then
            chmod +x templates/scripts/apply_doctrine_audit.sh
          else
            echo "::error::templates/scripts/apply_doctrine_audit.sh not found — cannot audit"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # GOVERNANCE CHECK
      # ─────────────────────────────────────────────────────────────

      - name: Check IMO_CONTROL.json exists
        id: governance
        run: |
          if [ ! -f "IMO_CONTROL.json" ]; then
            echo "::error::IMO_CONTROL.json not found - governance missing"
            echo "governance_exists=false" >> $GITHUB_OUTPUT
          else
            echo "governance_exists=true" >> $GITHUB_OUTPUT
            echo "✅ IMO_CONTROL.json found"
          fi

      # ─────────────────────────────────────────────────────────────
      # DOCTRINE AUDIT
      # ─────────────────────────────────────────────────────────────

      - name: Run Doctrine Audit
        id: audit
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  DOCTRINE ENFORCEMENT CI"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""

          # Run audit script
          ./templates/scripts/apply_doctrine_audit.sh . || AUDIT_EXIT=$?

          # Capture exit code
          if [ -z "$AUDIT_EXIT" ]; then
            AUDIT_EXIT=0
          fi

          echo "audit_exit_code=$AUDIT_EXIT" >> $GITHUB_OUTPUT

          # Parse results if audit file exists
          if [ -f "90_ops/doctrine_audit.json" ]; then
            VIOLATIONS=$(cat 90_ops/doctrine_audit.json | grep -o '"violations": [0-9]*' | grep -o '[0-9]*')
            WARNINGS=$(cat 90_ops/doctrine_audit.json | grep -o '"warnings": [0-9]*' | grep -o '[0-9]*')
            STATUS=$(cat 90_ops/doctrine_audit.json | grep -o '"status": "[^"]*"' | cut -d'"' -f4)

            echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
            echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          fi

          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::error::Doctrine audit failed with exit code $AUDIT_EXIT"
          fi

      # ─────────────────────────────────────────────────────────────
      # RESULTS SUMMARY
      # ─────────────────────────────────────────────────────────────

      - name: Display Audit Results
        run: |
          echo ""
          echo "───────────────────────────────────────────────────────────────"
          echo "  AUDIT RESULTS"
          echo "───────────────────────────────────────────────────────────────"
          echo ""

          if [ -f "90_ops/doctrine_audit.md" ]; then
            cat 90_ops/doctrine_audit.md
          else
            echo "⚠️ Audit report not generated"
          fi

      # ─────────────────────────────────────────────────────────────
      # WARNINGS OUTPUT
      # ─────────────────────────────────────────────────────────────

      - name: Print Warnings
        if: steps.audit.outputs.warnings != '0' && steps.audit.outputs.warnings != ''
        run: |
          echo ""
          echo "::warning::Doctrine audit found ${{ steps.audit.outputs.warnings }} warning(s)"
          echo ""
          echo "Warnings do not block the build but should be addressed."

      # ─────────────────────────────────────────────────────────────
      # UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────────────────────

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doctrine-audit-report
          path: |
            90_ops/doctrine_audit.json
            90_ops/doctrine_audit.md
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Compliance Status
        uses: actions/upload-artifact@v4
        if: steps.audit.outputs.audit_exit_code == '0'
        with:
          name: compliance-status
          path: COMPLIANCE_STATUS.md
          retention-days: 30
          if-no-files-found: ignore

      # ─────────────────────────────────────────────────────────────
      # ENFORCEMENT GATE
      # ─────────────────────────────────────────────────────────────

      - name: Enforce Doctrine Compliance
        if: steps.audit.outputs.audit_exit_code != '0'
        run: |
          echo ""
          echo "::error::DOCTRINE VIOLATION DETECTED"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  BUILD BLOCKED"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Violations found: ${{ steps.audit.outputs.violations }}"
          echo ""
          echo "Fix all violations before merging."
          echo "See doctrine_audit.md artifact for details."
          echo ""
          exit 1

      - name: Doctrine Compliance Passed
        if: steps.audit.outputs.audit_exit_code == '0'
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "  ✅ DOCTRINE COMPLIANCE PASSED"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Status: ${{ steps.audit.outputs.status }}"
          echo "Warnings: ${{ steps.audit.outputs.warnings }}"
          echo ""

  # ─────────────────────────────────────────────────────────────────
  # PRESSURE TEST GATE (Architectural changes only)
  # ─────────────────────────────────────────────────────────────────

  pressure-test-gate:
    name: Structural + Flow Pressure Test Gate
    runs-on: ubuntu-latest
    needs: doctrine-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # DETECT ARCHITECTURAL FLAG
      # ─────────────────────────────────────────────────────────────

      - name: Scan for pressure test requirement
        id: detect
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  PRESSURE TEST GATE"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""

          REQUIRES_PRESSURE="false"

          # Check work_packets inbox for any packet with requires_pressure_test: true
          if [ -d "work_packets/inbox" ]; then
            for f in work_packets/inbox/*.json; do
              [ -f "$f" ] || continue
              FLAG=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('requires_pressure_test','false'))" 2>/dev/null || echo "false")
              if [ "$FLAG" = "True" ] || [ "$FLAG" = "true" ]; then
                REQUIRES_PRESSURE="true"
                echo "Pressure test required by: $f"
              fi
            done
          fi

          # Also check changesets inbox
          if [ -d "changesets/inbox" ]; then
            for f in changesets/inbox/*.json; do
              [ -f "$f" ] || continue
              FLAG=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('requires_pressure_test','false'))" 2>/dev/null || echo "false")
              if [ "$FLAG" = "True" ] || [ "$FLAG" = "true" ]; then
                REQUIRES_PRESSURE="true"
                echo "Pressure test required by: $f"
              fi
            done
          fi

          echo "requires_pressure=$REQUIRES_PRESSURE" >> $GITHUB_OUTPUT

          if [ "$REQUIRES_PRESSURE" = "false" ]; then
            echo "No pressure test required — gate skipped."
          fi

      # ─────────────────────────────────────────────────────────────
      # VERIFY PRESSURE ARTIFACTS EXIST
      # ─────────────────────────────────────────────────────────────

      - name: Verify pressure test artifacts exist
        id: artifacts
        if: steps.detect.outputs.requires_pressure == 'true'
        run: |
          ARCH_EXISTS="false"
          FLOW_EXISTS="false"

          if [ -f "audit/ARCH_PRESSURE_REPORT.json" ]; then
            ARCH_EXISTS="true"
            echo "ARCH_PRESSURE_REPORT.json found"
          else
            echo "::error::ARCH_PRESSURE_REPORT.json NOT FOUND — pressure test requires this artifact"
          fi

          if [ -f "audit/FLOW_PRESSURE_REPORT.json" ]; then
            FLOW_EXISTS="true"
            echo "FLOW_PRESSURE_REPORT.json found"
          else
            echo "::error::FLOW_PRESSURE_REPORT.json NOT FOUND — pressure test requires this artifact"
          fi

          echo "arch_exists=$ARCH_EXISTS" >> $GITHUB_OUTPUT
          echo "flow_exists=$FLOW_EXISTS" >> $GITHUB_OUTPUT

          if [ "$ARCH_EXISTS" = "false" ] || [ "$FLOW_EXISTS" = "false" ]; then
            echo ""
            echo "::error::PRESSURE TEST FAILED — missing required artifacts"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # PARSE AND VALIDATE ALL FIELDS = PASS
      # ─────────────────────────────────────────────────────────────

      - name: Validate pressure test results (mechanical gate)
        if: steps.detect.outputs.requires_pressure == 'true' && steps.artifacts.outputs.arch_exists == 'true' && steps.artifacts.outputs.flow_exists == 'true'
        run: |
          GATE_PASS="true"

          echo "───────────────────────────────────────────────────────────────"
          echo "  ARCH_PRESSURE_REPORT — Field Validation"
          echo "───────────────────────────────────────────────────────────────"

          # Validate ARCH fields
          ARCH_FIELDS="cantonal_cardinality registry_first id_authority no_sideways_calls contracts_declared"
          for FIELD in $ARCH_FIELDS; do
            VALUE=$(python3 -c "import json; d=json.load(open('audit/ARCH_PRESSURE_REPORT.json')); print(d.get('$FIELD','MISSING'))")
            if [ "$VALUE" != "PASS" ]; then
              echo "::error::ARCH_PRESSURE_REPORT.$FIELD = $VALUE (expected PASS)"
              GATE_PASS="false"
            else
              echo "  $FIELD = PASS"
            fi
          done

          echo ""
          echo "───────────────────────────────────────────────────────────────"
          echo "  FLOW_PRESSURE_REPORT — Field Validation"
          echo "───────────────────────────────────────────────────────────────"

          # Validate FLOW fields
          FLOW_FIELDS="ingress_contract_exists egress_contract_exists no_orphan_tables no_unconsumed_events id_propagation_intact"
          for FIELD in $FLOW_FIELDS; do
            VALUE=$(python3 -c "import json; d=json.load(open('audit/FLOW_PRESSURE_REPORT.json')); print(d.get('$FIELD','MISSING'))")
            if [ "$VALUE" != "PASS" ]; then
              echo "::error::FLOW_PRESSURE_REPORT.$FIELD = $VALUE (expected PASS)"
              GATE_PASS="false"
            else
              echo "  $FIELD = PASS"
            fi
          done

          echo ""

          if [ "$GATE_PASS" = "false" ]; then
            echo "═══════════════════════════════════════════════════════════════"
            echo "  BUILD BLOCKED — PRESSURE TEST FAILED"
            echo "═══════════════════════════════════════════════════════════════"
            echo ""
            echo "One or more pressure test fields did not pass."
            echo "This is a mechanical gate. No manual override permitted."
            echo "Fix failing invariants and re-run."
            exit 1
          fi

          echo "═══════════════════════════════════════════════════════════════"
          echo "  PRESSURE TEST GATE PASSED"
          echo "═══════════════════════════════════════════════════════════════"

      - name: Upload Pressure Test Artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.detect.outputs.requires_pressure == 'true'
        with:
          name: pressure-test-reports
          path: |
            audit/ARCH_PRESSURE_REPORT.json
            audit/FLOW_PRESSURE_REPORT.json
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # UI BUILDER GATE (UI builds only)
  # ─────────────────────────────────────────────────────────────────

  ui-builder-gate:
    name: UI Builder Pre-Build Gate
    runs-on: ubuntu-latest
    needs: doctrine-audit
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check UI Control Contract
        id: ui_control
        run: |
          echo "───────────────────────────────────────────────────────────────"
          echo "  UI BUILDER PRE-BUILD GATE"
          echo "───────────────────────────────────────────────────────────────"
          echo ""

          # Check UI_CONTROL_CONTRACT.json exists
          if [ ! -f "UI_CONTROL_CONTRACT.json" ]; then
            echo "::warning::UI_CONTROL_CONTRACT.json not found - UI builds ungoverned"
            echo "ui_ready=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ UI_CONTROL_CONTRACT.json found"

          # Check if src/ui exists
          if [ ! -d "src/ui" ]; then
            echo "ℹ️ No src/ui directory - UI gate not applicable"
            echo "ui_ready=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for ui.manifest.json
          if [ ! -f "src/ui/ui.manifest.json" ]; then
            echo "::warning::src/ui/ui.manifest.json missing - UI builder cannot discover components"
            echo "ui_ready=false" >> $GITHUB_OUTPUT
          else
            echo "✅ ui.manifest.json found"
            echo "ui_ready=true" >> $GITHUB_OUTPUT
          fi

      - name: UI Builder Gate Status
        run: |
          echo ""
          echo "UI Ready: ${{ steps.ui_control.outputs.ui_ready }}"
          echo ""

          if [ "${{ steps.ui_control.outputs.ui_ready }}" = "true" ]; then
            echo "✅ Repository ready for UI builds"
          elif [ "${{ steps.ui_control.outputs.ui_ready }}" = "skip" ]; then
            echo "ℹ️ No UI components - UI gate skipped"
          else
            echo "⚠️ Repository not ready for UI builds"
            echo "   Create src/ui/ui.manifest.json to enable"
          fi
